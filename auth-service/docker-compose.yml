services:
  # Authentication Service
  auth-service:
    build: .
    ports:
      - "8081:8081"
    environment:
      - DB_URL=postgres://helios_user:password@postgres:5432/helios?sslmode=disable
      - REDIS_ADDR=redis:6379
    depends_on:
      - postgres
      - redis
    networks:
      - auth-network

  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: helios_user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: helios
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    networks:
      - auth-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - auth-network

networks:
  auth-network:
    driver: bridge

volumes:
  postgres-data:
